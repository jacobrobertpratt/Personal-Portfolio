<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Under Construction</title>
  <style>
    :root {
      --bg: #f6f4ef;     /* slightly off-white */
      --text: #b8b8b8;   /* light gray */
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display: grid;
      place-items: center;
    }

    .msg {
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.04em;
      font-weight: 300;
      text-align: center;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="msg">Under Construction</div>
</body>
</html>
